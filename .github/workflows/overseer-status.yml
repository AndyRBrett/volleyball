name: overseer-status

# Publish overseer-status.json on every run so the Project Overseer can tell
# "idle" from "broken". Runs weekly and on demand; commits the file when it changes.
on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

# Which sport the pipeline runs for. Set the repo/org variable PIPELINE_DOMAIN
# (Settings -> Secrets and variables -> Actions -> Variables) to "martial_arts"
# to switch the whole automated pipeline -- detection, self-test, and status --
# without touching code. Defaults to volleyball.
env:
  PIPELINE_DOMAIN: ${{ vars.PIPELINE_DOMAIN || 'volleyball' }}

jobs:
  write-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Auto-detect new footage in the watched drop folder and enqueue it
      # (Overseer #8). VOLLEYBALL_DROP_DIR can point at a synced cloud bucket /
      # local dir; a missing folder is treated as "idle", not an error.
      - name: Scan drop folder for new footage
        run: python ingest_watch.py

      # Prove the CV pipeline works end-to-end on the active domain's bundled
      # reference clip and record results/selftest.json, so the status reflects a
      # *verified* (not merely idle) pipeline. A broken pipeline fails here and
      # is visible. Honors PIPELINE_DOMAIN above.
      - name: Pipeline self-test (reference clip)
        run: python pipeline.py --self-test

      - name: Write overseer status
        run: python write_status.py

      - name: Commit status + ingest state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overseer-status.json ingest_state.json ingest_queue.json results/selftest.json
          if git diff --cached --quiet; then
            echo "No change to status or ingest state"
          else
            git commit -m "chore: update overseer status and ingest state"
            git push
          fi
