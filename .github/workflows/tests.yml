name: tests

# Run the stdlib unittest suite on every push and PR so the ingestion watcher,
# highlight generator, Cosmos tagger, and status writer stay green.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      # End-to-end pipeline self-test on the bundled reference clips -- one per
      # sport domain. Each fails the build if its detector/pipeline is broken,
      # instead of letting it sit silently at "0 frames processed" as before.
      - name: Pipeline self-test (volleyball reference clip)
        run: python pipeline.py --self-test --domain volleyball

      - name: Pipeline self-test (martial-arts reference clip)
        run: python pipeline.py --self-test --domain martial_arts
